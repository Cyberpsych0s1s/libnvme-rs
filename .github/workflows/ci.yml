name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (stable)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libnvme-dev \
            clang \
            libclang-dev

      - name: Verify libnvme version
        run: pkg-config --modversion libnvme

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Doc build (fails on broken intra-doc links)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libnvme-dev \
            clang \
            libclang-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Build (MSRV)
        run: cargo build --workspace --all-targets

  audit:
    name: cargo-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Audit
        # `cargo audit` requires the index, not libnvme-dev, so no apt step.
        run: cargo audit

  publish-dry-run:
    name: cargo publish --dry-run
    # Only on tag pushes — verifies the workspace can be published end-to-end
    # before we try the real publish.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libnvme-dev \
            clang \
            libclang-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-dry-run

      - name: Dry-run publish libnvme-sys
        run: cargo publish -p libnvme-sys --dry-run

      # Dry-run for the wrapper crate can't resolve the path-dep at the new
      # version until libnvme-sys is actually on the index, so we skip it
      # here — the real publish workflow handles the ordering.
