# cargo-deny configuration for libnvme-rs.
#
# Run locally with `cargo deny check`. CI runs the same via
# .github/workflows/ci.yml. Covers four areas:
#
#   advisories — known CVEs and unmaintained-crate warnings (RUSTSEC DB)
#   licenses   — allow-list for upstream licenses we link
#   bans       — duplicate-dependency and explicit ban detection
#   sources    — only allow crates from crates.io
#
# See https://embarkstudios.github.io/cargo-deny/ for the schema.

[graph]
# Stay on Linux only — libnvme is Linux-only and we don't want deny
# checking platform-specific deps that wouldn't compile anyway.
all-features = false
no-default-features = false
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
]

# ---------------------------------------------------------------------
# Advisories: RUSTSEC + unmaintained-crate warnings.
# ---------------------------------------------------------------------
[advisories]
version = 2
yanked = "deny"
# Empty by default; add specific advisory IDs here if we need a
# temporary exception with a justification comment.
ignore = []

# ---------------------------------------------------------------------
# Licenses: allow-list (we link LGPL-2.1+ libnvme at runtime, but the
# Rust deps themselves are all permissive — there should be no LGPL
# anywhere in the cargo dependency tree).
# ---------------------------------------------------------------------
[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "0BSD",
]
# Confidence threshold for crates whose license isn't SPDX-clean.
confidence-threshold = 0.93

# ---------------------------------------------------------------------
# Bans: forbid duplicate versions of the same dep, and any crate we
# don't want to depend on.
# ---------------------------------------------------------------------
[bans]
multiple-versions = "warn"  # downgrade to allow until we vendor-pin
wildcards = "deny"
deny = []
# Skip duplicate-warnings for crates with known multi-version trees
# (transitive through bindgen/clang-sys). Leave list empty for now;
# populate if `cargo deny check bans` complains about a specific dup.
skip = []
skip-tree = []

# ---------------------------------------------------------------------
# Sources: only crates.io. Forbid git deps.
# ---------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
